name: Family Audit

on:
  schedule:
    - cron: '0 7 * * 0'  # Sundays 7am UTC (midnight PT)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout dotai
        uses: actions/checkout@v4
        with:
          path: dotai

      - name: Checkout repos
        uses: actions/checkout@v4
        with:
          repository: yokedotlol/yoke
          path: yoke-public
      - uses: actions/checkout@v4
        with:
          repository: yokedotlol/certs-lol
          path: certs-lol
      - uses: actions/checkout@v4
        with:
          repository: yokedotlol/ns-lol
          path: ns-lol
      - uses: actions/checkout@v4
        with:
          repository: yokedotlol/xhttp
          path: xhttp-lol
      - uses: actions/checkout@v4
        with:
          repository: yokedotlol/vrfy-lol
          path: vrfy-lol

      - name: Run audit
        run: |
          chmod +x dotai/audit.sh
          dotai/audit.sh all --both
